# Docker Compose v3.0 - SESIS Complete Stack
version: '3.8'

services:
  # ─── Core Services ──────────────────────────────
  postgres:
    image: postgis/postgis:14-3.3
    environment:
      POSTGRES_USER: sis_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?Error: POSTGRES_PASSWORD no definida}
      POSTGRES_DB: sesis
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sis_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--jetstream --store_dir /data/jetstream"
    volumes:
      - nats_data:/data/jetstream
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER?Error: MINIO_ROOT_USER no definida}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD?Error: MINIO_ROOT_PASSWORD no definida}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── SESIS Backend (API) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sis_admin:${POSTGRES_PASSWORD?Error: POSTGRES_PASSWORD no definida}@postgres:5432/sesis
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
      JWT_SECRET_KEY: ${JWT_SECRET_KEY?Error: JWT_SECRET_KEY no definida}
      AES_KEY: ${AES_KEY?Error: AES_KEY no definida}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── ML Worker ─────────────────────────────────
  ml-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m workers.ml_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://sis_admin:${POSTGRES_PASSWORD?Error: POSTGRES_PASSWORD no definida}@postgres:5432/sesis
      NATS_URL: nats://nats:4222
    depends_on:
      - postgres
      - nats
    deploy:
      replicas: 2

  # ─── Frontend (UI) ────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    depends_on:
      - backend

  # ─── Observability ────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana:/etc/grafana/provisioning

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
