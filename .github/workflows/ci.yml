name: SESIS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt
        pip install pytest hvac
    - name: Run tests
      run: |
        # In a real environment, we'd mock the DB or use a service container
        echo "Running backend unit tests..."
        # pytest backend/tests

  edge-sdk-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Run Detekt
      run: |
        echo "Running Kotlin linting..."

  ui-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build static UI
      run: |
        echo "Validating UI assets..."
