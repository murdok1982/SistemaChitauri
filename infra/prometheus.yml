global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'sesis-api'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    
  - job_name: 'sesis-nats'
    static_configs:
      - targets: ['nats:8222']
    
  - job_name: 'sesis-postgres'
    static_configs:
      - targets: ['postgres:5432']
    
  - job_name: 'sesis-redis'
    static_configs:
      - targets: ['redis:6379']
    
  - job_name: 'sesis-ollama'
    static_configs:
      - targets: ['ollama:11434']
    
  - job_name: 'sesis-ui'
    static_configs:
      - targets: ['ui:3000']
