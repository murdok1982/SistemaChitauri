apiVersion: apps/v1
kind: Deployment
metadata:
  name: sesis-backend
  namespace: sesis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sesis-backend
  template:
    metadata:
      labels:
        app: sesis-backend
    spec:
      containers:
      - name: backend
        image: registry.sesis.eu/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: sesis-secrets
              key: database-url
        - name: NATS_URL
          value: nats://nats-cluster:4222
---
apiVersion: v1
kind: Service
metadata:
  name: sesis-backend-svc
  namespace: sesis
spec:
  selector:
    app: sesis-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
